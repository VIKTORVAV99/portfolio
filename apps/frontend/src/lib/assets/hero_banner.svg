<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    path {
      stroke: #f7f7ff; /* primary-500 */
    }
    .name-text {
      fill: #adadad; /* surface-300 for a subtle, sophisticated look */
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
      font-size: 42px;
      font-weight: 500;
      letter-spacing: -0.5px;
    }
  </style>

  <!-- Solid background using surface-950 -->
  <rect width="1200" height="675" fill="#111111" />

  <!-- URL - Moved to bottom left, sitting on the same visual baseline as the logo -->
  <text x="100" y="545" class="name-text">viktor.andersson.tech</text>

  <!--
    Nested SVG containing your logo.
    Width/Height: 200x200 (Less than 1/3 of 675px height limit).
    X/Y: Placed at 900, 375 to provide exactly 100px of padding from the bottom-right corner.
  -->
  <svg x="900" y="375" width="200" height="200" viewBox="0 0 800 800">
    <path d="M30 38 320 688 480 112 770 762M114 440 686 360" fill="none" stroke-width="55" />
  </svg>
</svg>