name: CI
permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 9 * * 0"

jobs:
  oxfmt:
    name: Oxfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Oxfmt
        run: bun --filter frontend format:check
  oxlint:
    name: Oxlint
    runs-on: ubuntu-latest
    needs:
      - oxfmt
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Oxlint
        run: bun --filter frontend lint
  svelte-check:
    name: Svelte Check
    runs-on: ubuntu-latest
    needs:
      - oxfmt
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Svelte Check
        run: bun --filter frontend check:ci
  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - oxfmt
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Sync SvelteKit
        run: cd apps/frontend && bunx svelte-kit sync
      - name: Test
        run: bun --filter frontend test:unit
  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - oxlint
      - svelte-check
      - test
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun --filter frontend build:ci
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: apps/frontend/.svelte-kit/cloudflare
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript"]
        # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
